<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0b0e">
<title>LiftLog 🪵</title>
<style>
  :root {
    --bg: #0a0b0e;
    --card: rgba(255,255,255,.035);
    --card-solid: #14161b;
    --line: rgba(255,255,255,.07);
    --text: #f2f3f5;
    --dim: #7d8590;
    --accent: #f5c04e;
    --accent-soft: rgba(245,192,78,.12);
    --good: #3fce8f;
    --fail: #ef5350;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  html { color-scheme: dark; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    letter-spacing: -0.01em;
    padding: 0 16px 110px; max-width: 520px; margin: 0 auto;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(600px 300px at 80% -5%, rgba(245,192,78,.07), transparent 60%),
      radial-gradient(500px 400px at -10% 30%, rgba(80,120,255,.05), transparent 60%);
  }
  #app, header, #footer { position: relative; z-index: 1; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 2px 18px;
  }
  h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.03em; }
  h1 .log { color: var(--accent); }
  #date {
    color: var(--dim); font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .dayname {
    font-size: 13px; color: var(--dim); margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .dayname b { color: var(--text); font-weight: 600; }
  .dayname::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px var(--accent);
    flex: none;
  }

  .ex {
    background: var(--card); border: 1px solid var(--line);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: var(--radius); padding: 18px 16px 16px; margin-bottom: 14px;
    animation: rise .4s cubic-bezier(.2,.8,.2,1) both;
  }
  .ex:nth-child(2) { animation-delay: .04s; } .ex:nth-child(3) { animation-delay: .08s; }
  .ex:nth-child(4) { animation-delay: .12s; } .ex:nth-child(5) { animation-delay: .16s; }
  .ex:nth-child(6) { animation-delay: .2s; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }

  .ex h2 { font-size: 17px; font-weight: 650; letter-spacing: -0.02em; margin-bottom: 3px; }
  .target {
    display: inline-block; font-size: 12.5px; font-weight: 600; color: var(--accent);
    background: var(--accent-soft); border-radius: 999px; padding: 3px 10px; margin: 4px 0 2px;
  }
  .hint { font-size: 12.5px; color: var(--dim); margin: 4px 0 0; }
  .sets { margin-top: 14px; }

  .setrow {
    display: grid; grid-template-columns: 24px 1fr 1fr 52px; gap: 8px;
    align-items: center; margin-bottom: 8px;
  }
  .setrow .n { color: var(--dim); font-size: 12px; font-weight: 700; text-align: center; font-variant-numeric: tabular-nums; }
  input {
    width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--line);
    color: var(--text); border-radius: 12px; padding: 13px 8px;
    font-size: 17px; font-weight: 600; text-align: center;
    font-variant-numeric: tabular-nums;
    -webkit-appearance: none; appearance: none;
    transition: border-color .15s, background .15s;
  }
  input::placeholder { color: #4a5160; font-weight: 500; }
  input:focus { outline: none; border-color: var(--accent); background: rgba(245,192,78,.06); }
  .ftoggle {
    background: rgba(255,255,255,.05); border: 1px solid var(--line); color: var(--dim);
    border-radius: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .04em; padding: 14px 0; text-align: center; cursor: pointer;
    user-select: none; transition: all .15s;
  }
  .ftoggle.on {
    background: rgba(239,83,80,.16); border-color: var(--fail); color: var(--fail);
  }

  .btn {
    display: block; width: 100%; border: none; border-radius: 14px; padding: 14px;
    font-size: 15px; font-weight: 700; letter-spacing: -0.01em; cursor: pointer;
    transition: transform .1s, opacity .15s, background .2s;
  }
  .btn:active { transform: scale(.98); }
  .save { background: var(--accent); color: #171207; margin-top: 10px; }
  .save.done { background: var(--good); color: #06120c; }
  .more {
    background: none; border: none; color: var(--dim); font-size: 13.5px; font-weight: 600;
    padding: 10px 0 4px; cursor: pointer;
  }
  .prev {
    font-size: 12px; color: var(--dim); margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--line); font-variant-numeric: tabular-nums;
  }

  #footer {
    position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 520px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex; gap: 10px;
    background: linear-gradient(to top, var(--bg) 65%, transparent);
  }
  #footer .btn {
    background: rgba(255,255,255,.06); color: var(--text);
    border: 1px solid var(--line); backdrop-filter: blur(12px);
    font-size: 13.5px; padding: 12px;
  }

  #toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: var(--good); color: #06120c; font-weight: 700; font-size: 14px;
    padding: 11px 20px; border-radius: 999px; z-index: 10;
    opacity: 0; transition: all .3s cubic-bezier(.2,.8,.2,1); pointer-events: none;
    box-shadow: 0 8px 30px rgba(63,206,143,.35);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading { color: var(--dim); text-align: center; padding: 80px 0; font-size: 14px; }
</style>
</head>
<body>
<header>
  <h1>Lift<span class="log">Log</span> 🪵</h1>
  <span id="date"></span>
</header>
<div id="app" class="loading">Loading today's workout…</div>
<div id="footer">
  <button class="btn" onclick="addOther('cardio')">+ Cardio</button>
  <button class="btn" onclick="addOther('mobility')">+ Mobility</button>
  <button class="btn" onclick="reload()">↻</button>
</div>
<div id="toast"></div>

<script>
let DATA = null;

async function reload() {
  document.getElementById('app').innerHTML = '<div class="loading">Loading…</div>';
  DATA = await (await fetch('/api/today')).json();
  render();
}

function render() {
  const d = new Date(DATA.date + 'T12:00:00');
  document.getElementById('date').textContent =
    d.toLocaleDateString(undefined, {weekday: 'short', month: 'short', day: 'numeric'});
  const app = document.getElementById('app');
  if (!DATA.day) { app.innerHTML = '<div class="loading">No program day found.</div>'; return; }
  let html = `<div class="dayname">Today · <b>${esc(DATA.day.name)}</b></div>`;
  DATA.exercises.forEach((ex, i) => {
    const w = ex.target_weight != null ? ex.target_weight : '';
    html += `<div class="ex" id="ex${i}">
      <h2>${esc(ex.name)}</h2>
      <span class="target">${ex.sets} × ${ex.lo}${ex.hi !== ex.lo ? '–' + ex.hi : ''}${w !== '' ? ' @ ' + w + ' lb' : ''}</span>
      ${ex.hint ? `<div class="hint">${esc(ex.hint)}</div>` : ''}
      <div class="sets" data-ex="${i}"></div>
      <button class="more" onclick="addSet(${i})">+ add set</button>
      <button class="btn save" onclick="saveEx(${i}, this)">Log ${esc(ex.name)}</button>
      ${ex.prev && ex.prev.length ? `<div class="prev">Last — ${ex.prev.map(p => `${p.weight}×${p.reps}`).join(' · ')}</div>` : ''}
    </div>`;
  });
  app.innerHTML = html;
  DATA.exercises.forEach((ex, i) => {
    for (let s = 0; s < ex.sets; s++) addSet(i);
  });
}

function addSet(i) {
  const ex = DATA.exercises[i];
  const box = document.querySelector(`.sets[data-ex="${i}"]`);
  const n = box.children.length + 1;
  const w = ex.target_weight != null ? ex.target_weight : '';
  const row = document.createElement('div');
  row.className = 'setrow';
  row.innerHTML = `<span class="n">${n}</span>
    <input inputmode="decimal" placeholder="lbs" value="${w}">
    <input inputmode="numeric" placeholder="reps">
    <span class="ftoggle" title="to failure" onclick="this.classList.toggle('on')">fail</span>`;
  box.appendChild(row);
  if (n > 1) row.children[2].focus();
}

async function saveEx(i, btn) {
  const ex = DATA.exercises[i];
  const rows = [...document.querySelectorAll(`.sets[data-ex="${i}"] .setrow`)];
  const sets = rows.map(r => ({
    weight: parseFloat(r.children[1].value) || 0,
    reps: parseInt(r.children[2].value) || 0,
    failure: r.children[3].classList.contains('on'),
  })).filter(s => s.reps > 0);
  if (!sets.length) { toast('Nothing to log'); return; }
  btn.style.opacity = .6;
  const res = await fetch('/api/log', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type: 'sets', day: DATA.day.name, exercise: ex.name, sets}),
  });
  const out = await res.json();
  btn.style.opacity = 1;
  if (out.ok) {
    btn.textContent = `Logged ${out.added} set${out.added > 1 ? 's' : ''} ✓`;
    btn.classList.add('done');
    toast(`${ex.name} logged`);
    setTimeout(reload, 900);
  } else toast('Error saving');
}

async function addOther(kind) {
  if (kind === 'cardio') {
    const k = prompt('Cardio type (walk / stairs / sprints):', 'incline walk');
    if (!k) return;
    const mins = prompt('Minutes:');
    if (!mins) return;
    const detail = prompt('Detail (incline, speed, etc):', '') || '';
    await post({type: 'cardio', day: DATA.day.name, kind: k, duration_min: parseInt(mins), detail});
  } else {
    const items = prompt('Mobility done (comma separated):', 'flexibility flow');
    if (!items) return;
    await post({type: 'mobility', day: DATA.day.name, items: items.split(',').map(s => s.trim())});
  }
  toast('Logged');
  reload();
}

async function post(obj) {
  await fetch('/api/log', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(obj)});
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1600);
}
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

reload();
</script>
</body>
</html>
