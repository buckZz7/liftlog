<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>LiftLog 🪵</title>
<style>
  :root {
    --bg: #000000; --panel: transparent;
    --line: #1c1c1c; --line-hi: #2e2e2e;
    --text: #e8e8e8; --dim: #6b6b6b; --faint: #404040;
    --accent: #ffffff; --accent-text: #000000;
    --done: #8a8a8a; --bar: #ffffff;
  }
  html.light {
    --bg: #ffffff;
    --line: #e0e0e0; --line-hi: #c8c8c8;
    --text: #111111; --dim: #8a8a8a; --faint: #b5b5b5;
    --accent: #000000; --accent-text: #ffffff;
    --done: #8a8a8a; --bar: #000000;
  }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  html { color-scheme: dark; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.5 "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    padding: 0 16px 100px; max-width: 520px; margin: 0 auto;
  }

  header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 20px 0 14px; border-bottom: 1px solid var(--line);
  }
  h1 { font-size: 16px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
  h1 .log { color: var(--accent); }
  #date {
    color: var(--dim); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .12em;
  }
  .dayname {
    font-size: 11.5px; color: var(--dim); letter-spacing: .1em; text-transform: uppercase;
    padding: 14px 0 16px; border-bottom: 1px solid var(--line); margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .dayname b { color: var(--accent); font-weight: 700; }
  .dayname::before { content: "▸"; color: var(--dim); }

  .ex {
    border: 1px solid var(--line); border-radius: 2px;
    padding: 16px 14px 14px; margin-bottom: 14px;
    position: relative;
  }
  .ex::before {
    content: ""; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--bar); opacity: .25;
  }
  .ex h2 {
    font-size: 13.5px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .target {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .06em;
    color: var(--accent); border: 1px solid var(--line-hi);
    padding: 3px 8px; margin: 2px 0 4px; text-transform: uppercase;
  }
  .hint { font-size: 11.5px; color: var(--dim); margin-top: 4px; }
  .hint::before { content: "// "; color: var(--faint); }
  .sets { margin-top: 14px; }

  .setrow {
    display: grid; grid-template-columns: 30px 1fr 1fr 56px; gap: 6px;
    align-items: center; margin-bottom: 6px;
  }
  .setrow .n {
    color: var(--dim); font-size: 11px; font-weight: 700; text-align: center;
    border: 1px solid var(--line); padding: 12px 0;
  }
  input {
    width: 100%; background: transparent; border: 1px solid var(--line);
    color: var(--text); border-radius: 2px; padding: 12px 8px;
    font: 600 16px/1 inherit; text-align: center; font-variant-numeric: tabular-nums;
    -webkit-appearance: none; appearance: none; transition: border-color .12s;
  }
  input::placeholder { color: var(--faint); font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: .08em; }
  input:focus { outline: none; border-color: var(--accent); }
  .ftoggle {
    background: transparent; border: 1px solid var(--line); color: var(--dim);
    border-radius: 2px; font: 700 10px/1 inherit; text-transform: uppercase;
    letter-spacing: .1em; padding: 14px 0; text-align: center; cursor: pointer;
    user-select: none; transition: all .12s;
  }
  .ftoggle.on { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }

  .btn {
    display: block; width: 100%; border: none; border-radius: 2px; padding: 14px;
    font: 700 12px/1 inherit; letter-spacing: .14em; text-transform: uppercase;
    cursor: pointer; transition: opacity .12s;
  }
  .btn:active { opacity: .75; }
  .save { background: var(--accent); color: var(--accent-text); margin-top: 12px; }
  .save.done { background: var(--done); color: var(--accent-text); }
  .more {
    background: none; border: none; color: var(--dim);
    font: 700 11px/1 inherit; letter-spacing: .1em; text-transform: uppercase;
    padding: 12px 0 4px; cursor: pointer;
  }
  .prev {
    font-size: 11px; color: var(--dim); margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--line); font-variant-numeric: tabular-nums;
  }
  .prev::before { content: "PREV // "; color: var(--faint); }

  .checkitem {
    display: flex; align-items: center; gap: 12px; padding: 12px 2px;
    border-bottom: 1px solid var(--line); cursor: pointer; user-select: none;
  }
  .checkitem:last-of-type { border-bottom: none; }
  .checkitem .box {
    width: 18px; height: 18px; flex: none; border-radius: 2px;
    border: 1px solid var(--dim); display: grid; place-items: center;
    font-size: 11px; color: transparent; transition: all .12s;
  }
  .checkitem.done .box { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
  .checkitem.done .lbl { color: var(--dim); text-decoration: line-through; }
  .checkitem .lbl { font-size: 13px; }
  .sectiontitle {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .16em;
    color: var(--dim); margin: 26px 0 10px;
  }
  .sectiontitle::before { content: "▸ "; }

  #footer {
    position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 520px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 70%, transparent);
  }
  #footer .btn {
    background: transparent; color: var(--dim); border: 1px solid var(--line-hi);
  }

  #toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: var(--accent-text); font: 700 11px/1 inherit;
    letter-spacing: .12em; text-transform: uppercase;
    padding: 12px 20px; border-radius: 2px; z-index: 10;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  #sheet {
    position: fixed; inset: 0; z-index: 20; display: none;
    background: rgba(0,0,0,.55);
  }
  #sheet.open { display: block; }
  #sheet .panel {
    position: absolute; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 520px;
    background: var(--bg); border-top: 1px solid var(--line-hi);
    padding: 14px 16px calc(16px + env(safe-area-inset-bottom));
  }
  #sheet .ptitle { font-size: 11px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 10px; text-align: center; }
  .wheels { display: flex; gap: 10px; }
  .wheel { flex: 1; position: relative; }
  .wheel .wl { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    color: var(--dim); text-align: center; margin-bottom: 6px; }
  .scroll {
    height: 180px; overflow-y: scroll; scroll-snap-type: y mandatory;
    border: 1px solid var(--line); border-radius: 2px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }
  .scroll .opt {
    height: 36px; display: grid; place-items: center; scroll-snap-align: center;
    font-size: 16px; font-weight: 600; color: var(--dim); font-variant-numeric: tabular-nums;
  }
  .scroll .opt.sel { color: var(--text); }
  .wheel .marker {
    position: absolute; left: 0; right: 0; top: 50%; height: 36px; margin-top: 9px;
    transform: translateY(-50%); border-top: 1px solid var(--line-hi);
    border-bottom: 1px solid var(--line-hi); pointer-events: none;
  }
  .pad { height: 72px; }
  #sheet .btn { margin-top: 14px; }

  .loading { color: var(--dim); text-align: center; padding: 80px 0; font-size: 12px;
    letter-spacing: .12em; text-transform: uppercase; }
</style>
</head>
<body>
<header>
  <h1>Lift<span class="log">Log</span> 🪵</h1>
  <span id="date"></span>
</header>
<div id="app" class="loading">Loading…</div>
<div id="footer">
  <button class="btn" onclick="reload()">↻ Refresh</button>
  <button class="btn" onclick="toggleTheme()" id="themebtn">◐ Light</button>
</div>
<div id="toast"></div>
<div id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="panel">
    <div class="ptitle" id="sheettitle">SET 01</div>
    <div class="wheels">
      <div class="wheel"><div class="wl">lbs</div><div class="scroll" id="ww"></div><div class="marker"></div></div>
      <div class="wheel"><div class="wl">reps</div><div class="scroll" id="wr"></div><div class="marker"></div></div>
    </div>
    <button class="btn save" onclick="closeSheet(true)">Done</button>
  </div>
</div>

<script>
let DATA = null;

async function reload() {
  document.getElementById('app').innerHTML = '<div class="loading">Loading…</div>';
  DATA = await (await fetch('/api/today')).json();
  render();
}

function render() {
  const d = new Date(DATA.date + 'T12:00:00');
  document.getElementById('date').textContent =
    d.toLocaleDateString(undefined, {weekday: 'short', month: 'short', day: 'numeric'});
  const app = document.getElementById('app');
  if (!DATA.day) { app.innerHTML = '<div class="loading">No program day found</div>'; return; }
  let html = `<div class="dayname">Today · <b>${esc(DATA.day.name)}</b></div>`;
  DATA.exercises.forEach((ex, i) => {
    const w = ex.target_weight != null ? ex.target_weight : '';
    html += `<div class="ex" id="ex${i}">
      <h2>${esc(ex.name)}</h2>
      <span class="target">${ex.sets} × ${ex.lo}${ex.hi !== ex.lo ? '–' + ex.hi : ''}${w !== '' ? ' @ ' + w + ' lb' : ''}</span>
      ${ex.hint ? `<div class="hint">${esc(ex.hint)}</div>` : ''}
      <div class="sets" data-ex="${i}"></div>
      <button class="more" onclick="addSet(${i})">+ add set</button>
      <button class="btn save" onclick="saveEx(${i}, this)">Log ${esc(ex.name)}</button>
      ${ex.prev && ex.prev.length ? `<div class="prev">${ex.prev.map(p => `${p.weight}×${p.reps}`).join(' · ')}</div>` : ''}
    </div>`;
  });
  app.innerHTML = html;
  DATA.exercises.forEach((ex, i) => {
    for (let s = 0; s < ex.sets; s++) addSet(i);
  });
  renderChecklist();
}

function renderChecklist() {
  const app = document.getElementById('app');
  let html = '';
  if (DATA.cardio && DATA.cardio.length) {
    html += `<div class="sectiontitle">Cardio</div><div class="ex">` +
      DATA.cardio.map((c) =>
        `<div class="checkitem" data-kind="cardio" data-item="${esc(c)}" onclick="toggleCheck(this)">
           <span class="box">✓</span><span class="lbl">${esc(c)}</span></div>`).join('') +
      `<button class="btn save" onclick="logChecklist('cardio', this)">Log cardio</button></div>`;
  }
  if (DATA.mobility && DATA.mobility.length) {
    html += `<div class="sectiontitle">Flexibility flow · 10 min</div><div class="ex">` +
      DATA.mobility.map((c) =>
        `<div class="checkitem" data-kind="mobility" data-item="${esc(c)}" onclick="toggleCheck(this)">
           <span class="box">✓</span><span class="lbl">${esc(c)}</span></div>`).join('') +
      `<button class="btn save" onclick="logChecklist('mobility', this)">Log flexibility</button></div>`;
  }
  app.insertAdjacentHTML('beforeend', html);
}

function toggleCheck(el) { el.classList.toggle('done'); }

async function logChecklist(kind, btn) {
  const items = [...document.querySelectorAll(`.checkitem[data-kind="${kind}"].done`)]
    .map(el => el.dataset.item);
  if (!items.length) { toast('Check items off first'); return; }
  if (kind === 'mobility') {
    await post({type: 'mobility', day: DATA.day.name, items});
  } else {
    await post({type: 'cardio', day: DATA.day.name, kind: DATA.day.name, detail: items.join('; ')});
  }
  btn.textContent = 'Logged ✓'; btn.classList.add('done');
  toast(kind === 'mobility' ? 'Flexibility logged' : 'Cardio logged');
}

function addSet(i) {
  const ex = DATA.exercises[i];
  const box = document.querySelector(`.sets[data-ex="${i}"]`);
  const n = box.children.length + 1;
  const w = ex.target_weight != null ? ex.target_weight : '';
  const row = document.createElement('div');
  row.className = 'setrow';
  row.innerHTML = `<span class="n">${String(n).padStart(2, '0')}</span>
    <input readonly placeholder="lbs" value="${w}" onclick="openSheet(this,'w')">
    <input readonly placeholder="reps" onclick="openSheet(this,'r')">
    <span class="ftoggle" title="to failure" onclick="this.classList.toggle('on')">fail</span>`;
  box.appendChild(row);
  if (n > 1) row.children[2].focus();
}

async function saveEx(i, btn) {
  const ex = DATA.exercises[i];
  const rows = [...document.querySelectorAll(`.sets[data-ex="${i}"] .setrow`)];
  const sets = rows.map(r => ({
    weight: parseFloat(r.children[1].value) || 0,
    reps: parseInt(r.children[2].value) || 0,
    failure: r.children[3].classList.contains('on'),
  })).filter(s => s.reps > 0);
  if (!sets.length) { toast('Nothing to log'); return; }
  btn.style.opacity = .6;
  const res = await fetch('/api/log', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type: 'sets', day: DATA.day.name, exercise: ex.name, sets}),
  });
  const out = await res.json();
  btn.style.opacity = 1;
  if (out.ok) {
    btn.textContent = `Logged ${out.added} set${out.added > 1 ? 's' : ''} ✓`;
    btn.classList.add('done');
    toast(`${ex.name} logged`);
    setTimeout(reload, 900);
  } else toast('Error saving');
}

async function post(obj) {
  await fetch('/api/log', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(obj)});
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1600);
}
function toggleTheme() {
  const light = document.documentElement.classList.toggle('light');
  localStorage.setItem('ll-theme', light ? 'light' : 'dark');
  document.getElementById('themebtn').textContent = light ? '◑ Dark' : '◐ Light';
}
if (localStorage.getItem('ll-theme') === 'light') {
  document.documentElement.classList.add('light');
  document.addEventListener('DOMContentLoaded', () =>
    document.getElementById('themebtn').textContent = '◑ Dark');
}
/* ---- wheel picker ---- */
let SHEET = null; // {el, kind}
const W_VALS = [];
for (let v = 0; v <= 500; v += 2.5) W_VALS.push(v % 1 ? String(v) : String(v));
const R_VALS = []; for (let v = 0; v <= 50; v++) R_VALS.push(String(v));

function buildWheel(el, vals) {
  el.innerHTML = '<div class="pad"></div>' +
    vals.map(v => `<div class="opt" data-v="${v}">${v}</div>`).join('') +
    '<div class="pad"></div>';
  el.addEventListener('scroll', () => {
    clearTimeout(el._t);
    el._t = setTimeout(() => snapWheel(el), 80);
  });
}
function snapWheel(el) {
  const i = Math.round(el.scrollTop / 36);
  el.scrollTo({top: i * 36, behavior: 'smooth'});
  markSel(el);
}
function markSel(el) {
  const i = Math.round(el.scrollTop / 36);
  el.querySelectorAll('.opt').forEach((o, j) => o.classList.toggle('sel', j === i));
}
function wheelVal(el) {
  const o = el.querySelectorAll('.opt')[Math.round(el.scrollTop / 36)];
  return o ? o.dataset.v : '';
}
function setWheel(el, val) {
  const opts = [...el.querySelectorAll('.opt')];
  let i = opts.findIndex(o => o.dataset.v === String(val));
  if (i < 0) { // nearest
    let best = 1e9;
    opts.forEach((o, j) => { const d = Math.abs(parseFloat(o.dataset.v) - parseFloat(val || 0)); if (d < best) { best = d; i = j; } });
  }
  el.scrollTop = i * 36; markSel(el);
}
function openSheet(input, kind) {
  const row = input.closest('.setrow');
  SHEET = {w: row.children[1], r: row.children[2]};
  document.getElementById('sheettitle').textContent =
    'SET ' + row.querySelector('.n').textContent;
  const ww = document.getElementById('ww'), wr = document.getElementById('wr');
  if (!ww.children.length) { buildWheel(ww, W_VALS); buildWheel(wr, R_VALS); }
  setWheel(ww, SHEET.w.value || 0);
  setWheel(wr, SHEET.r.value || 0);
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(commit) {
  if (commit && SHEET) {
    SHEET.w.value = wheelVal(document.getElementById('ww'));
    SHEET.r.value = wheelVal(document.getElementById('wr'));
  }
  document.getElementById('sheet').classList.remove('open');
  SHEET = null;
}

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

reload();
</script>
</body>
</html>
